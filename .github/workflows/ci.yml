name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          python -m compileall agent moss_integration reranker metrics tests

      - name: Basic import smoke test
        run: |
          python - <<'PY'
          import importlib
          modules = [
              "agent.chat_agent",
              "agent.voice_agent",
              "moss_integration.moss_indexer",
              "moss_integration.moss_retriever",
              "reranker.inference",
              "metrics.benchmark",
          ]
          for name in modules:
              importlib.import_module(name)
          print("Import smoke test passed.")
          PY

      - name: Run tests
        run: |
          pytest -q
